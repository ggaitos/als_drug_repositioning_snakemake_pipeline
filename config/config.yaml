# ===== Input GWAS — the one thing a new user changes =====
gwas:
  name: ALS_fullrun
  file: resources/gwas/ALS_sumstats_EUR_only.txt.gz
  # map YOUR file's column headers to what the scripts expect
  columns:
    snp: rsid
    non_effect_allele: other_allele
    effect_allele: effect_allele
    beta: beta
    pvalue: p_value
  sample_size: 138086
  n_cases: 27205

# ===== Reference data (staged via README setup; paths only) =====
reference:
  coordinate_map: resources/data/coordinate_map/map_snp150_hg19.txt.gz
  ld_blocks: resources/data/eur_ld.bed.gz
  parquet_dir: resources/data/reference_panel_1000G          # holds chr{1..22}.variants.parquet
  parquet_metadata: resources/data/reference_panel_1000G/variant_metadata.parquet
  mashr_dir: resources/data/models/eqtl/mashr
  gencode: resources/annotation/gencode.v41_gene_annotation_table.txt

# ===== Imputation (Im-lab / CAD-tutorial standard values) =====
impute:
  sub_batches: 10
  window: 100000
  frequency_filter: 0.01
  regularization: 0.1
  parsimony: 7

# ===== S-PrediXcan tissues =====
spredixcan:
  tissues:
    - Whole_Blood
    - Brain_Amygdala
    - Brain_Anterior_cingulate_cortex_BA24
    - Brain_Caudate_basal_ganglia
    - Brain_Cerebellar_Hemisphere
    - Brain_Cerebellum
    - Brain_Cortex
    - Brain_Frontal_Cortex_BA9
    - Brain_Hypothalamus
    - Brain_Nucleus_accumbens_basal_ganglia
    - Brain_Putamen_basal_ganglia
    - Brain_Spinal_cord_cervical_c-1
    - Brain_Substantia_nigra

# ===== Signature =====
signature:
  tissue: Brain_Spinal_cord_cervical_c-1
  fdr_cutoff: 0.05

# ===== ExperimentHub cache (LINCS auto-downloads here) =====
experimenthub_cache: resources/experimenthub_cache

drugbank:
  approved_list: resources/drugbank/approved_drugs.txt
